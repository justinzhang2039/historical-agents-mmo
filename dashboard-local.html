<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Agents MMO - 本地观察者界面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .server-config {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .server-config input {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            color: #fff;
            margin-top: 10px;
        }
        .btn {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .panel {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            padding: 20px;
            margin-bottom: 20px;
        }
        .panel-title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .agent-card {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .agent-name { font-size: 16px; font-weight: 600; color: #fff; }
        .agent-location { font-size: 13px; color: #888; margin-top: 5px; }
        .event-item {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #ffd700;
        }
        .event-title { font-weight: 600; color: #fff; }
        .event-desc { font-size: 12px; color: #888; margin-top: 4px; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .error { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); padding: 15px; border-radius: 8px; color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏛️ Historical Agents MMO</h1>
        <p style="color: #888;">本地观察者界面</p>
    </div>
    
    <div class="server-config">
        <label>服务器地址（请填写你的服务器 IP）</label>
        <input type="text" id="server-url" placeholder="http://115.191.60.79:4567" value="http://115.191.60.79:4567">
        <button class="btn" onclick="connect()">连接</button>
    </div>
    
    <div id="content">
        <div class="loading">请输入服务器地址并点击连接</div>
    </div>
    
    <script>
        let API_URL = '';
        
        async function connect() {
            API_URL = document.getElementById('server-url').value.trim();
            if (!API_URL) {
                alert('请输入服务器地址');
                return;
            }
            
            document.getElementById('content').innerHTML = '<div class="loading">连接中...⏳</div>';
            
            try {
                // 测试连接
                const res = await fetch(`${API_URL}/health`, { 
                    method: 'GET',
                    mode: 'cors',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    loadDashboard();
                } else {
                    throw new Error('Server returned ' + res.status);
                }
            } catch (e) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <strong>连接失败</strong><br>
                        ${e.message}<br><br>
                        可能的原因：<br>
                        1. 服务器地址错误<br>
                        2. 服务器未启动<br>
                        3. CORS 跨域限制（需要服务器配置）<br>
                        4. 防火墙阻止连接
                    </div>
                `;
            }
        }
        
        async function loadDashboard() {
            try {
                // 获取 Agent 列表
                const agentsRes = await fetch(`${API_URL}/api/agents`, { mode: 'cors' });
                const agentsData = await agentsRes.json();
                
                // 获取事件
                const eventsRes = await fetch(`${API_URL}/api/events?limit=10`, { mode: 'cors' });
                const eventsData = await eventsRes.json();
                
                renderDashboard(agentsData.data, eventsData.data);
            } catch (e) {
                document.getElementById('content').innerHTML = `
                    <div class="error">加载数据失败: ${e.message}</div>
                `;
            }
        }
        
        function renderDashboard(agents, events) {
            const content = document.getElementById('content');
            
            let html = '';
            
            // Agent 列表
            html += '<div class="panel">';
            html += '<div class="panel-title">🎭 历史人物 (' + agents.length + ')</div>';
            
            if (agents.length === 0) {
                html += '<div class="loading">暂无 Agent</div>';
            } else {
                agents.forEach(agent => {
                    html += `
                        <div class="agent-card">
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-location">📍 ${agent.location} | Lv.${agent.level} | ${agent.faction}</div>
                            <div style="margin-top: 10px; font-size: 12px; color: #666;">
                                武力:${agent.stats.strength} 智力:${agent.stats.intelligence} 
                                魅力:${agent.stats.charisma} 政治:${agent.stats.politics}
                            </div>
                        </div>
                    `;
                });
            }
            html += '</div>';
            
            // 事件流
            html += '<div class="panel">';
            html += '<div class="panel-title">📜 世界事件</div>';
            
            if (!events || events.length === 0) {
                html += '<div class="loading">暂无事件</div>';
            } else {
                events.forEach(event => {
                    html += `
                        <div class="event-item">
                            <div class="event-title">${event.name}</div>
                            <div class="event-desc">${event.description}</div>
                        </div>
                    `;
                });
            }
            html += '</div>';
            
            html += '<button class="btn" onclick="loadDashboard()" style="width: 100%;">刷新数据</button>';
            
            content.innerHTML = html;
        }
        
        // 自动连接（如果地址已填写）
        window.onload = () => {
            const urlInput = document.getElementById('server-url');
            if (urlInput.value) {
                // 不自动连接，等待用户点击
            }
        };
    </script>
</body>
</html>
